<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>购买提示</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-page" aria-label="购买提示">
      <section class="screen unavailable-screen">
        <header class="status-bar" aria-label="状态栏">
          <time>12:05</time>
          <div class="status-icons" aria-hidden="true">
            <span class="signal"></span>
            <span class="wifi"></span>
            <span class="battery"><span></span></span>
          </div>
        </header>

        <nav class="top-nav" aria-label="页面导航">
          <a class="back-button" href="./index.html" aria-label="返回购买页">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </a>
          <h1>购买提示</h1>
        </nav>

        <section class="unavailable-content" aria-label="购买提示说明">
          <div class="payment-result-icon payment-result-icon-unavailable" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M21 11.5a8.5 8.5 0 0 1-8.5 8.5 8.6 8.6 0 0 1-3.9-.9L3 21l1.9-5.2a8.6 8.6 0 0 1-.9-4.3 8.5 8.5 0 0 1 17 0z" />
              <path d="M8.5 12h.01" />
              <path d="M12 12h.01" />
              <path d="M15.5 12h.01" />
            </svg>
          </div>
          <h2>你的流量卡暂不可续费</h2>
          <p>
            请使用微信联系官方客服<br />
            在线时间早9:30-晚22:00
          </p>
          <div class="qr-placeholder" aria-label="客服二维码占位符">
            <span>二维码</span>
          </div>
          <a class="payment-result-link" href="./index.html" aria-label="返回流量专区页面">
            返回
          </a>
        </section>
      </section>
    </main>
  </body>
</html>
